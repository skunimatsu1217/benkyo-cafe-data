<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員情報 - 勉強カフェ新宿</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <header>
        <h1>勉強カフェ新宿エリア データダッシュボード</h1>
    </header>
    <main>
        <a href="../dashboard.html" class="back-link">&larr; トップに戻る</a>
        <h1 class="page-title">会員情報</h1>
        <div class="data-period" id="period">
            <strong>データ期間：</strong> 読み込み中...
        </div>

        <div class="stats-grid" id="stats"></div>

        <div class="tab-container">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('overview')">概要・属性分析</button>
                <button class="tab-btn" onclick="switchTab('bcs')">BCS 会員一覧</button>
                <button class="tab-btn" onclick="switchTab('bcbp')">BCBP 会員一覧</button>
                <button class="tab-btn" onclick="switchTab('hearing')">入会ヒヤリング</button>
            </div>

            <div class="tab-content active" id="tab-overview">
                <div class="two-col">
                    <div class="chart-section">
                        <h2>BCS 年齢分布</h2>
                        <div class="chart-container"><canvas id="ageBcsChart"></canvas></div>
                    </div>
                    <div class="chart-section">
                        <h2>BCBP 年齢分布</h2>
                        <div class="chart-container"><canvas id="ageBcbpChart"></canvas></div>
                    </div>
                </div>
                <div class="two-col">
                    <div class="chart-section">
                        <h2>BCS プラン分布</h2>
                        <div class="chart-container"><canvas id="planBcsChart"></canvas></div>
                    </div>
                    <div class="chart-section">
                        <h2>BCBP プラン分布</h2>
                        <div class="chart-container"><canvas id="planBcbpChart"></canvas></div>
                    </div>
                </div>
                <div class="two-col">
                    <div class="chart-section">
                        <h2>BCS 会員の目標 TOP15</h2>
                        <div class="chart-container"><canvas id="goalBcsChart"></canvas></div>
                    </div>
                    <div class="chart-section">
                        <h2>BCBP 会員の目標 TOP15</h2>
                        <div class="chart-container"><canvas id="goalBcbpChart"></canvas></div>
                    </div>
                </div>
                <div class="chart-section">
                    <h2>月別入会数推移</h2>
                    <div class="chart-container"><canvas id="joinChart"></canvas></div>
                </div>
            </div>

            <div class="tab-content" id="tab-bcs">
                <div class="chart-section">
                    <h2>BCS 契約中会員一覧</h2>
                    <div class="filter-bar">
                        <input type="text" id="bcs-search" placeholder="会員番号・名前・プランで検索..." oninput="filterTable('bcs')">
                    </div>
                    <div class="data-table-wrapper" style="max-height:600px;overflow-y:auto;">
                        <table class="data-table" id="bcs-table">
                            <thead><tr><th>状態</th><th>会員番号</th><th>氏名</th><th>プラン</th><th>契約日</th><th>月額</th><th>目標</th></tr></thead>
                            <tbody id="bcs-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="tab-bcbp">
                <div class="chart-section">
                    <h2>BCBP 契約中会員一覧</h2>
                    <div class="filter-bar">
                        <input type="text" id="bcbp-search" placeholder="会員番号・名前・プランで検索..." oninput="filterTable('bcbp')">
                    </div>
                    <div class="data-table-wrapper" style="max-height:600px;overflow-y:auto;">
                        <table class="data-table" id="bcbp-table">
                            <thead><tr><th>状態</th><th>会員番号</th><th>氏名</th><th>プラン</th><th>契約日</th><th>月額</th><th>目標</th></tr></thead>
                            <tbody id="bcbp-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="tab-hearing">
                <div class="two-col">
                    <div class="chart-section">
                        <h2>職業分布</h2>
                        <div class="chart-container"><canvas id="jobChart"></canvas></div>
                    </div>
                    <div class="chart-section">
                        <h2>知ったきっかけ</h2>
                        <div class="chart-container"><canvas id="channelChart"></canvas></div>
                    </div>
                </div>
                <div class="two-col">
                    <div class="chart-section">
                        <h2>入会目的</h2>
                        <div class="chart-container"><canvas id="purposeChart"></canvas></div>
                    </div>
                    <div class="chart-section">
                        <h2>入会の決め手</h2>
                        <div class="chart-container"><canvas id="decidingChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer><p>&copy; 勉強カフェ新宿エリア</p></footer>

    <script src="../data/members.js"></script>
    <script src="../data/member_stats.js"></script>
    <script>
    if (sessionStorage.getItem('bc_auth') !== 'ok') { window.location.href = '../index.html'; }

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        event.target.classList.add('active');
    }

    function filterTable(store) {
        const query = document.getElementById(store + '-search').value.toLowerCase();
        document.querySelectorAll(`#${store}-tbody tr`).forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(query) ? '' : 'none';
        });
    }

    function createPieChart(canvasId, dataObj) {
        const labels = Object.keys(dataObj);
        const values = Object.values(dataObj);
        new Chart(document.getElementById(canvasId), {
            type: 'doughnut',
            data: { labels, datasets: [{ data: values, backgroundColor: labels.map((_, i) => `hsl(${i * 360 / labels.length}, 55%, 55%)`) }] },
            options: { responsive: true, plugins: { legend: { position: 'right', labels: { font: { size: 10 } } } } }
        });
    }

    function createBarChart(canvasId, dataObj, color) {
        const labels = Object.keys(dataObj);
        const values = Object.values(dataObj);
        new Chart(document.getElementById(canvasId), {
            type: 'bar',
            data: { labels, datasets: [{ data: values, backgroundColor: color }] },
            options: { responsive: true, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true } } }
        });
    }

    function renderMemberTable(members, tbodyId) {
        document.getElementById(tbodyId).innerHTML = members.map(m => `
            <tr style="${m.is_active ? '' : 'opacity:0.5;'}">
                <td style="color:${m.is_active ? '#27ae60' : '#e67e22'};font-weight:bold;">${m.is_active ? 'アクティブ' : '休会'}</td>
                <td>${m.id}</td><td>${m.name}</td><td>${m.plan}</td>
                <td>${m.join_date}</td><td>${m.monthly_fee}</td><td>${m.goal}</td>
            </tr>
        `).join('');
    }

    function init() {
        const d = membersData;
        const s = memberStatsData;

        document.getElementById('period').innerHTML =
            `<strong>データ期間：</strong> ${d.period.from} / ${d.period.to}`;

        document.getElementById('stats').innerHTML = `
            <h3 style="grid-column:1/-1;font-size:0.95rem;color:#2c3e50;margin:0;">アクティブ会員</h3>
            <div class="stat-card bcs"><div class="stat-value">${d.bcs.total_truly_active}</div><div class="stat-label">BCS</div></div>
            <div class="stat-card bp"><div class="stat-value">${d.bcbp.total_truly_active}</div><div class="stat-label">BCBP</div></div>
            <h3 style="grid-column:1/-1;font-size:0.95rem;color:#e67e22;margin:0;">休会中（ミニッツ/カムバック）</h3>
            <div class="stat-card warn"><div class="stat-value">${d.bcs.total_inactive_plan}</div><div class="stat-label">BCS</div></div>
            <div class="stat-card warn"><div class="stat-value">${d.bcbp.total_inactive_plan}</div><div class="stat-label">BCBP</div></div>
            <h3 style="grid-column:1/-1;font-size:0.95rem;color:#7f8c8d;margin:0;">全会員数（契約中全体）</h3>
            <div class="stat-card total"><div class="stat-value">${d.bcs.total_contracted}</div><div class="stat-label">BCS</div></div>
            <div class="stat-card total"><div class="stat-value">${d.bcbp.total_contracted}</div><div class="stat-label">BCBP</div></div>
        `;

        // Age charts
        createBarChart('ageBcsChart', s.bcs.age_groups, 'rgba(52,152,219,0.7)');
        createBarChart('ageBcbpChart', s.bcbp.age_groups, 'rgba(231,76,60,0.7)');

        // Plan charts
        createPieChart('planBcsChart', d.bcs.plans);
        createPieChart('planBcbpChart', d.bcbp.plans);

        // Goal charts
        createBarChart('goalBcsChart', s.bcs.goals, 'rgba(46,204,113,0.7)');
        createBarChart('goalBcbpChart', s.bcbp.goals, 'rgba(155,89,182,0.7)');

        // Join chart
        const allJoinMonths = [...new Set([...d.bcs.monthly_join.labels, ...d.bcbp.monthly_join.labels])].sort();
        const bcsJoinMap = {}, bcbpJoinMap = {};
        d.bcs.monthly_join.labels.forEach((m, i) => bcsJoinMap[m] = d.bcs.monthly_join.values[i]);
        d.bcbp.monthly_join.labels.forEach((m, i) => bcbpJoinMap[m] = d.bcbp.monthly_join.values[i]);

        new Chart(document.getElementById('joinChart'), {
            type: 'bar',
            data: {
                labels: allJoinMonths,
                datasets: [
                    { label: 'BCS', data: allJoinMonths.map(m => bcsJoinMap[m] || 0), backgroundColor: 'rgba(52,152,219,0.7)' },
                    { label: 'BCBP', data: allJoinMonths.map(m => bcbpJoinMap[m] || 0), backgroundColor: 'rgba(231,76,60,0.7)' }
                ]
            },
            options: { responsive: true, scales: { x: { ticks: { maxTicksLimit: 20 } }, y: { beginAtZero: true } } }
        });

        // Member tables
        renderMemberTable(d.bcs.active_members, 'bcs-tbody');
        renderMemberTable(d.bcbp.active_members, 'bcbp-tbody');

        // Hearing charts
        createBarChart('jobChart', d.hearing.jobs, 'rgba(46,204,113,0.7)');
        createBarChart('channelChart', d.hearing.channels, 'rgba(155,89,182,0.7)');
        createBarChart('purposeChart', d.hearing.purposes, 'rgba(52,152,219,0.7)');
        createBarChart('decidingChart', d.hearing.deciding_factors, 'rgba(230,126,34,0.7)');
    }
    init();
    </script>
</body>
</html>
