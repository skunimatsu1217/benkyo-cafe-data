<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約・来店報告 - 勉強カフェ新宿</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <header>
        <h1>勉強カフェ新宿エリア データダッシュボード</h1>
    </header>
    <main>
        <a href="../dashboard.html" class="back-link">&larr; トップに戻る</a>
        <h1 class="page-title">予約・来店報告</h1>
        <div class="data-period" id="period">
            <strong>データ期間：</strong> 読み込み中...
        </div>
        <div class="data-note">
            <strong>注意：</strong> 2024年以前のデータは、予約なし（飛び込み）の来店や見学が記録されていない可能性があります（スタッフの記入漏れ）。入会済みだが記載がない、予約なしで見学したが記録されていないケースがある前提でご参照ください。
        </div>

        <div class="stats-grid" id="stats"></div>

        <div class="chart-section">
            <h2>月別 来店・入会推移</h2>
            <div class="chart-container">
                <canvas id="visitChart"></canvas>
            </div>
        </div>

        <div class="chart-section">
            <h2>月別 入会率推移</h2>
            <p style="font-size:0.85rem;color:#666;margin-bottom:0.5rem;">来店者に対する入会者の割合</p>
            <div class="chart-container">
                <canvas id="rateChart"></canvas>
            </div>
        </div>

        <div class="two-col">
            <div class="chart-section">
                <h2>来店種別</h2>
                <div class="chart-container"><canvas id="typeChart"></canvas></div>
            </div>
            <div class="chart-section">
                <h2>予約経路</h2>
                <div class="chart-container"><canvas id="routeChart"></canvas></div>
            </div>
        </div>

        <div class="chart-section">
            <h2>スタジオ別来店数</h2>
            <div class="chart-container"><canvas id="studioChart"></canvas></div>
        </div>
    </main>
    <footer><p>&copy; 勉強カフェ新宿エリア</p></footer>

    <script src="../data/reservations.js"></script>
    <script>
    if (sessionStorage.getItem('bc_auth') !== 'ok') { window.location.href = '../index.html'; }
    function createPieChart(canvasId, dataObj) {
        const labels = Object.keys(dataObj);
        const values = Object.values(dataObj);
        new Chart(document.getElementById(canvasId), {
            type: 'doughnut',
            data: {
                labels,
                datasets: [{
                    data: values,
                    backgroundColor: labels.map((_, i) =>
                        `hsl(${i * 360 / labels.length + 30}, 55%, 55%)`)
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { position: 'right', labels: { font: { size: 11 } } } }
            }
        });
    }

    function init() {
        const data = reservationsData;

        document.getElementById('period').innerHTML =
            `<strong>データ期間：</strong> ${data.period.from} ～ ${data.period.to}`;

        const totalVisits = data.monthly.visits.reduce((a, b) => a + b, 0);
        const totalJoins = data.monthly.joins.reduce((a, b) => a + b, 0);
        const totalNotJoined = data.monthly.not_joined.reduce((a, b) => a + b, 0);
        const convRate = totalVisits > 0 ? ((totalJoins / totalVisits) * 100).toFixed(1) : 0;

        document.getElementById('stats').innerHTML = `
            <div class="stat-card total">
                <div class="stat-value">${data.total_records.toLocaleString()}</div>
                <div class="stat-label">総レコード数</div>
            </div>
            <div class="stat-card bcs">
                <div class="stat-value">${totalVisits.toLocaleString()}</div>
                <div class="stat-label">来店数</div>
            </div>
            <div class="stat-card total">
                <div class="stat-value">${totalJoins.toLocaleString()}</div>
                <div class="stat-label">入会数</div>
            </div>
            <div class="stat-card warn">
                <div class="stat-value">${convRate}%</div>
                <div class="stat-label">入会率（来店→入会）</div>
            </div>
        `;

        // Visit chart
        new Chart(document.getElementById('visitChart'), {
            type: 'bar',
            data: {
                labels: data.monthly.labels,
                datasets: [
                    { label: '来店', data: data.monthly.visits, backgroundColor: 'rgba(52,152,219,0.7)' },
                    { label: '入会', data: data.monthly.joins, backgroundColor: 'rgba(46,204,113,0.7)' },
                    { label: '未入会', data: data.monthly.not_joined, backgroundColor: 'rgba(231,76,60,0.5)' }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    x: { ticks: { maxTicksLimit: 20 }, stacked: false },
                    y: { beginAtZero: true }
                }
            }
        });

        // Conversion rate chart
        const rates = data.monthly.labels.map((_, i) => {
            const v = data.monthly.visits[i];
            const j = data.monthly.joins[i];
            return v > 0 ? ((j / v) * 100).toFixed(1) : 0;
        });

        new Chart(document.getElementById('rateChart'), {
            type: 'line',
            data: {
                labels: data.monthly.labels,
                datasets: [{
                    label: '入会率 (%)',
                    data: rates,
                    borderColor: '#2ecc71',
                    backgroundColor: 'rgba(46,204,113,0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: { ticks: { maxTicksLimit: 20 } },
                    y: { beginAtZero: true, max: 100, title: { display: true, text: '%' } }
                }
            }
        });

        // Type & Route charts
        createPieChart('typeChart', data.types);
        createPieChart('routeChart', data.routes);

        // Studio chart
        const studios = Object.entries(data.studios);
        new Chart(document.getElementById('studioChart'), {
            type: 'bar',
            data: {
                labels: studios.map(s => s[0]),
                datasets: [{
                    data: studios.map(s => s[1]),
                    backgroundColor: studios.map((_, i) =>
                        `hsl(${i * 60 + 200}, 55%, 55%)`)
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });
    }
    init();
    </script>
</body>
</html>
