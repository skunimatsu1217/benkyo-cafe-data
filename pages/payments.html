<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支払い・プラン情報 - 勉強カフェ新宿</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        .month-selector { display:flex; align-items:center; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap; }
        .month-selector select { padding:0.4rem 0.8rem; border:1px solid #ddd; border-radius:4px; font-size:0.9rem; }
        .month-selector label { font-size:0.85rem; color:#666; }
        .store-toggle { display:flex; gap:0; margin-bottom:1rem; }
        .store-toggle button { padding:0.5rem 1.2rem; border:1px solid #ddd; background:#fff; cursor:pointer; font-size:0.85rem; color:#666; }
        .store-toggle button:first-child { border-radius:4px 0 0 4px; }
        .store-toggle button:last-child { border-radius:0 4px 4px 0; }
        .store-toggle button.active { background:#2c3e50; color:#fff; border-color:#2c3e50; }
        .plan-bar { display:flex; align-items:center; margin-bottom:4px; font-size:0.8rem; }
        .plan-bar .plan-name { width:160px; text-align:right; padding-right:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .plan-bar .bar-wrap { flex:1; background:#f0f0f0; border-radius:3px; height:20px; position:relative; }
        .plan-bar .bar { height:100%; border-radius:3px; display:flex; align-items:center; padding-left:4px; color:#fff; font-size:0.7rem; font-weight:bold; min-width:1px; }
        .plan-bar .count { margin-left:8px; color:#666; min-width:40px; }
        .change-item { padding:4px 0; border-bottom:1px solid #f0f0f0; font-size:0.8rem; display:flex; gap:0.5rem; }
        .change-item .arrow { color:#e74c3c; font-weight:bold; }
    </style>
</head>
<body>
    <header><h1>勉強カフェ新宿エリア データダッシュボード</h1></header>
    <main>
        <a href="../dashboard.html" class="back-link">&larr; トップに戻る</a>
        <h1 class="page-title">支払い・プラン情報</h1>
        <div class="data-period" id="period"><strong>データ期間：</strong> 読み込み中...</div>

        <div class="store-toggle" id="storeToggle">
            <button class="active" onclick="setStore('bcs')">BCS 新宿スタジオ</button>
            <button onclick="setStore('bcbp')">BCBP BPスタジオ</button>
        </div>

        <div class="stats-grid" id="stats"></div>

        <div class="chart-section">
            <h2>月別売上推移</h2>
            <div class="chart-container"><canvas id="revenueChart"></canvas></div>
        </div>

        <div class="chart-section">
            <h2>プラン別会員数推移（直近24ヶ月）</h2>
            <div class="chart-container"><canvas id="planTrendChart"></canvas></div>
        </div>

        <div class="chart-section">
            <h2>月別プラン内訳</h2>
            <div class="month-selector">
                <label>表示月：</label>
                <select id="monthSelect" onchange="renderMonthDetail()"></select>
            </div>
            <div class="two-col">
                <div>
                    <h3 style="font-size:0.95rem;margin-bottom:0.5rem;">プラン別人数</h3>
                    <div id="monthPlanCount"></div>
                </div>
                <div>
                    <h3 style="font-size:0.95rem;margin-bottom:0.5rem;">プラン別売上</h3>
                    <div id="monthPlanRevenue"></div>
                </div>
            </div>
        </div>

        <div class="chart-section">
            <h2>プラン変更履歴</h2>
            <p style="font-size:0.85rem;color:#666;margin-bottom:0.5rem;">会員が月をまたいでプランを変更した記録</p>
            <div class="two-col">
                <div>
                    <h3 style="font-size:0.95rem;margin-bottom:0.5rem;">よくある変更パターン TOP15</h3>
                    <div id="topFlows"></div>
                </div>
                <div>
                    <h3 style="font-size:0.95rem;margin-bottom:0.5rem;">選択月のプラン変更</h3>
                    <div id="monthChanges"></div>
                </div>
            </div>
        </div>

        <div class="chart-section">
            <h2>月別プラン変更件数推移</h2>
            <div class="chart-container"><canvas id="changeChart"></canvas></div>
        </div>

        <div class="chart-section">
            <h2>即日アップグレード履歴</h2>
            <p style="font-size:0.85rem;color:#666;margin-bottom:0.5rem;">月途中でのプランアップグレード（差額課金）の記録</p>
            <div class="stats-grid" id="upgradeStats"></div>
            <div class="chart-container" style="margin-bottom:1rem;"><canvas id="upgradeChart"></canvas></div>
            <div class="filter-bar">
                <input type="text" id="upgrade-search" placeholder="会員番号・名前・プラン名で検索..." oninput="filterUpgrades()">
                <select id="upgradeMonthSelect" onchange="filterUpgrades()">
                    <option value="">全期間</option>
                </select>
            </div>
            <div class="data-table-wrapper" style="max-height:500px;overflow-y:auto;">
                <table class="data-table" id="upgrade-table">
                    <thead><tr><th>決済日</th><th>会員番号</th><th>氏名</th><th>内容</th><th>金額</th><th>ステータス</th></tr></thead>
                    <tbody id="upgrade-tbody"></tbody>
                </table>
            </div>
        </div>
    </main>
    <footer><p>&copy; 勉強カフェ新宿エリア</p></footer>

    <script src="../data/payments.js"></script>
    <script src="../data/plan_detail.js"></script>
    <script src="../data/upgrades.js"></script>
    <script>
    if (sessionStorage.getItem('bc_auth') !== 'ok') { window.location.href = '../index.html'; }

    let currentStore = 'bcs';
    let revenueChart, planTrendChart, changeChart;

    const PLAN_COLORS = {};
    function getPlanColor(plan, idx) {
        if (!PLAN_COLORS[plan]) PLAN_COLORS[plan] = `hsl(${(idx * 37) % 360}, 55%, 55%)`;
        return PLAN_COLORS[plan];
    }

    function setStore(store) {
        currentStore = store;
        document.querySelectorAll('#storeToggle button').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        renderAll();
    }

    function renderBars(containerId, dataObj, isYen) {
        const sorted = Object.entries(dataObj).sort((a, b) => b[1] - a[1]);
        const max = sorted.length > 0 ? sorted[0][1] : 1;
        const container = document.getElementById(containerId);
        container.innerHTML = sorted.map(([name, val], i) => {
            const w = Math.max((val / max) * 100, 2);
            const color = getPlanColor(name, i);
            const display = isYen ? `¥${val.toLocaleString()}` : val;
            return `<div class="plan-bar">
                <div class="plan-name" title="${name}">${name}</div>
                <div class="bar-wrap"><div class="bar" style="width:${w}%;background:${color}">${w > 15 ? display : ''}</div></div>
                <div class="count">${display}</div>
            </div>`;
        }).join('');
    }

    function renderMonthDetail() {
        const ym = document.getElementById('monthSelect').value;
        const sd = planDetailData[currentStore];
        const md = sd.monthly[ym];
        if (!md) return;
        renderBars('monthPlanCount', md.counts, false);
        renderBars('monthPlanRevenue', md.revenue, true);

        // Month changes
        const changes = sd.changes.monthly[ym] || {};
        const changeEntries = Object.entries(changes).sort((a, b) => b[1] - a[1]);
        document.getElementById('monthChanges').innerHTML = changeEntries.length === 0
            ? '<p style="color:#999;font-size:0.85rem;">この月のプラン変更はありません</p>'
            : changeEntries.map(([flow, count]) =>
                `<div class="change-item"><span class="arrow">${flow}</span><span style="color:#2c3e50;font-weight:bold;">${count}件</span></div>`
            ).join('');
    }

    function destroyChart(chart) { if (chart) chart.destroy(); return null; }

    function renderAll() {
        const sd = planDetailData[currentStore];
        const pd = paymentsData[currentStore];

        document.getElementById('period').innerHTML =
            `<strong>データ期間：</strong> ${pd.period.from} ～ ${pd.period.to}`;

        document.getElementById('stats').innerHTML = `
            <div class="stat-card ${currentStore === 'bcs' ? 'bcs' : 'bp'}">
                <div class="stat-value">¥${pd.total_revenue.toLocaleString()}</div>
                <div class="stat-label">累計売上</div>
            </div>
            <div class="stat-card total">
                <div class="stat-value">${pd.total_records.toLocaleString()}</div>
                <div class="stat-label">決済件数</div>
            </div>
            <div class="stat-card warn">
                <div class="stat-value">${sd.changes.total.toLocaleString()}</div>
                <div class="stat-label">プラン変更件数（累計）</div>
            </div>
        `;

        // Revenue chart
        revenueChart = destroyChart(revenueChart);
        revenueChart = new Chart(document.getElementById('revenueChart'), {
            type: 'line',
            data: {
                labels: pd.monthly_revenue.labels,
                datasets: [{
                    label: '月別売上',
                    data: pd.monthly_revenue.values,
                    borderColor: currentStore === 'bcs' ? '#3498db' : '#e74c3c',
                    backgroundColor: currentStore === 'bcs' ? 'rgba(52,152,219,0.1)' : 'rgba(231,76,60,0.1)',
                    fill: true, tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: { x: { ticks: { maxTicksLimit: 20 } }, y: { beginAtZero: true, ticks: { callback: v => '¥' + (v/10000).toFixed(0) + '万' } } }
            }
        });

        // Plan trend (stacked area)
        const trendData = sd.plan_trend;
        const datasets = Object.entries(trendData.plans)
            .filter(([_, vals]) => vals.some(v => v > 0))
            .sort((a, b) => b[1].reduce((s, v) => s + v, 0) - a[1].reduce((s, v) => s + v, 0))
            .slice(0, 12)
            .map(([plan, vals], i) => ({
                label: plan, data: vals,
                backgroundColor: getPlanColor(plan, i),
                borderColor: getPlanColor(plan, i),
                fill: true, tension: 0.3
            }));

        planTrendChart = destroyChart(planTrendChart);
        planTrendChart = new Chart(document.getElementById('planTrendChart'), {
            type: 'line',
            data: { labels: trendData.labels, datasets },
            options: {
                responsive: true,
                plugins: { legend: { position: 'right', labels: { font: { size: 10 } } } },
                scales: { x: { ticks: { maxTicksLimit: 12 } }, y: { stacked: true, beginAtZero: true } }
            }
        });

        // Month selector
        const select = document.getElementById('monthSelect');
        const prevVal = select.value;
        select.innerHTML = sd.months.slice().reverse().map(m => `<option value="${m}">${m}</option>`).join('');
        if (prevVal && sd.months.includes(prevVal)) select.value = prevVal;
        renderMonthDetail();

        // Top flows
        renderBars('topFlows', sd.changes.top_flows, false);

        // Change count chart
        const changeMonths = sd.months;
        const changeCounts = changeMonths.map(ym => {
            const mc = sd.changes.monthly[ym];
            return mc ? Object.values(mc).reduce((s, v) => s + v, 0) : 0;
        });

        changeChart = destroyChart(changeChart);
        changeChart = new Chart(document.getElementById('changeChart'), {
            type: 'bar',
            data: {
                labels: changeMonths,
                datasets: [{ label: 'プラン変更件数', data: changeCounts, backgroundColor: 'rgba(155,89,182,0.6)' }]
            },
            options: {
                responsive: true,
                scales: { x: { ticks: { maxTicksLimit: 20 } }, y: { beginAtZero: true } }
            }
        });
        // Upgrade section
        renderUpgrades();
    }

    let upgradeChart2;
    function renderUpgrades() {
        const ud = upgradeData[currentStore];

        document.getElementById('upgradeStats').innerHTML = `
            <div class="stat-card warn">
                <div class="stat-value">${ud.total}</div>
                <div class="stat-label">即日アップグレード件数</div>
            </div>
        `;

        // Upgrade monthly chart
        upgradeChart2 = destroyChart(upgradeChart2);
        if (ud.monthly.labels.length > 0) {
            upgradeChart2 = new Chart(document.getElementById('upgradeChart'), {
                type: 'bar',
                data: {
                    labels: ud.monthly.labels,
                    datasets: [
                        { label: '件数', data: ud.monthly.counts, backgroundColor: 'rgba(230,126,34,0.6)', yAxisID: 'y' },
                        { label: '金額', data: ud.monthly.revenue, borderColor: '#e74c3c', backgroundColor: 'rgba(231,76,60,0.1)', type: 'line', fill: true, tension: 0.3, yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { ticks: { maxTicksLimit: 20 } },
                        y: { beginAtZero: true, position: 'left', title: { display: true, text: '件数' } },
                        y1: { beginAtZero: true, position: 'right', grid: { drawOnChartArea: false }, ticks: { callback: v => '¥' + (v/10000).toFixed(0) + '万' } }
                    }
                }
            });
        }

        // Month selector for upgrades
        const sel = document.getElementById('upgradeMonthSelect');
        const months = [...new Set(ud.records.map(r => r.ym))].sort().reverse();
        sel.innerHTML = '<option value="">全期間</option>' + months.map(m => `<option value="${m}">${m}</option>`).join('');

        // Render table
        renderUpgradeTable(ud.records);
    }

    function renderUpgradeTable(records) {
        document.getElementById('upgrade-tbody').innerHTML = records.map(r =>
            `<tr>
                <td>${r.date}</td>
                <td>${r.member}</td>
                <td>${r.name}</td>
                <td style="white-space:normal;max-width:300px;">${r.course}</td>
                <td style="text-align:right;">¥${r.amount.toLocaleString()}</td>
                <td>${r.status}</td>
            </tr>`
        ).join('');
    }

    function filterUpgrades() {
        const query = document.getElementById('upgrade-search').value.toLowerCase();
        const month = document.getElementById('upgradeMonthSelect').value;
        const ud = upgradeData[currentStore];
        const filtered = ud.records.filter(r => {
            if (month && r.ym !== month) return false;
            if (query && !(r.member + r.name + r.course).toLowerCase().includes(query)) return false;
            return true;
        });
        renderUpgradeTable(filtered);
    }

    renderAll();
    </script>
</body>
</html>
